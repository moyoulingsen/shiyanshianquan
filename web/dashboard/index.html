<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LabGuard Indoor Dashboard</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>LabGuard Indoor</h1>
          <p id="subtitle">室内传感器实时状态</p>
        </div>
        <div class="connection">
          <span id="connection-dot" class="dot"></span>
          <span id="connection-text">未连接</span>
        </div>
      </header>

      <section class="config-panel" aria-label="连接配置">
        <label>
          <span>数据源</span>
          <select id="source-select">
            <option value="mqtt" selected>MQTT WebSocket</option>
            <option value="ws">本地串口桥</option>
          </select>
        </label>
        <label id="ws-field" class="hidden">
          <span>WebSocket</span>
          <input id="ws-url" value="ws://localhost:8787" />
        </label>
        <label id="mqtt-field">
          <span>MQTT WS</span>
          <input id="mqtt-url" value="ws://localhost:9001" />
        </label>
        <button id="connect-btn" type="button">连接</button>
      </section>

      <section class="metric-grid" aria-label="实时指标">
        <article class="metric-card">
          <span>温度</span>
          <strong id="temperature">--</strong>
          <small>°C</small>
        </article>
        <article class="metric-card">
          <span>湿度</span>
          <strong id="humidity">--</strong>
          <small>%RH</small>
        </article>
        <article class="metric-card">
          <span>VOC 指标</span>
          <strong id="voc">--</strong>
          <small>ENS160</small>
        </article>
        <article class="metric-card">
          <span>MQ-2</span>
          <strong id="mq2">--</strong>
          <small>数字报警</small>
        </article>
      </section>

      <section class="status-grid">
        <article class="panel camera-panel">
          <div class="panel-title">
            <h2>室内摄像头</h2>
            <span id="camera-state" class="badge">等待画面</span>
          </div>
          <div class="camera-frame-wrap">
            <img id="camera-preview" alt="室内摄像头实时画面" />
            <div id="camera-empty" class="camera-empty">暂无摄像头画面</div>
          </div>
          <dl class="state-list compact-state-list">
            <div>
              <dt>分辨率</dt>
              <dd id="camera-resolution">--</dd>
            </div>
            <div>
              <dt>帧序号</dt>
              <dd id="camera-sequence">--</dd>
            </div>
            <div>
              <dt>最后画面</dt>
              <dd id="camera-last-update">--</dd>
            </div>
          </dl>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>风险融合</h2>
            <span id="risk-badge" class="badge">--</span>
          </div>
          <dl class="state-list">
            <div>
              <dt>风险文本</dt>
              <dd id="risk-text">--</dd>
            </div>
            <div>
              <dt>风扇</dt>
              <dd id="fan-state">--</dd>
            </div>
            <div>
              <dt>水泵</dt>
              <dd id="pump-state">--</dd>
            </div>
            <div>
              <dt>报警</dt>
              <dd id="alarm-state">--</dd>
            </div>
          </dl>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>节点状态</h2>
            <span id="sensor-ok" class="badge">--</span>
          </div>
          <dl class="state-list">
            <div>
              <dt>运行时间</dt>
              <dd id="uptime">--</dd>
            </div>
            <div>
              <dt>Wi-Fi RSSI</dt>
              <dd id="rssi">--</dd>
            </div>
            <div>
              <dt>固件版本</dt>
              <dd id="version">--</dd>
            </div>
            <div>
              <dt>最后更新</dt>
              <dd id="last-update">--</dd>
            </div>
          </dl>
        </article>
      </section>

      <section class="panel command-panel">
        <div class="panel-title">
          <h2>演示控制</h2>
        </div>
        <div class="button-row">
          <button data-command="reset" type="button">重置</button>
          <div class="actuator-control" data-actuator-panel="fan">
            <button id="fan-toggle" class="toggle-control is-off" data-toggle-actuator="fan" type="button">风扇：关闭</button>
            <label class="slider-panel hidden" id="fan-slider-panel">
              <span>风扇电压 / 速度</span>
              <div class="slider-row">
                <button class="step-button" type="button" data-step-actuator="fan" data-step-delta="-1" aria-label="风扇减少">−</button>
                <input id="fan-slider" type="range" min="0" max="100" step="1" value="100" data-level-actuator="fan" />
                <button class="step-button" type="button" data-step-actuator="fan" data-step-delta="1" aria-label="风扇增加">+</button>
                <output id="fan-slider-value">100%</output>
              </div>
            </label>
          </div>
          <div class="actuator-control" data-actuator-panel="pump">
            <button id="pump-toggle" class="toggle-control is-off" data-toggle-actuator="pump" type="button">水泵：关闭</button>
            <label class="slider-panel hidden" id="pump-slider-panel">
              <span>水泵电压 / 速度</span>
              <div class="slider-row">
                <button class="step-button" type="button" data-step-actuator="pump" data-step-delta="-1" aria-label="水泵减少">−</button>
                <input id="pump-slider" type="range" min="0" max="100" step="1" value="100" data-level-actuator="pump" />
                <button class="step-button" type="button" data-step-actuator="pump" data-step-delta="1" aria-label="水泵增加">+</button>
                <output id="pump-slider-value">100%</output>
              </div>
            </label>
          </div>
          <button id="alarm-toggle" class="toggle-control is-off" data-toggle-alarm type="button">喇叭：关闭</button>
          <button data-command="force_normal" type="button">正常</button>
          <button data-command="force_warning" type="button">高温预警</button>
          <button data-command="force_alarm" type="button">有毒气体事件</button>
          <button data-command="force_emergency" type="button">火灾事件</button>
        </div>
      </section>

      <section class="panel log-panel">
        <div class="panel-title">
          <h2>消息流</h2>
          <button id="clear-log" type="button">清空</button>
        </div>
        <ol id="message-log"></ol>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
